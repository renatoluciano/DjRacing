<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Corrida</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #eee; }
        #pista {
            width: 80%; height: 100px; background-color: #333;
            margin: 30px auto; position: relative; border-bottom: 5px dashed #fff;
        }
        #carro {
            width: 50px; height: 30px; background-color: #e74c3c;
            position: absolute; top: 35px; left: 0px; border-radius: 5px;
        }
        #linha-chegada {
            width: 15px; height: 100%; position: absolute; right: 50px;
            background: linear-gradient(45deg, #fff 25%, #000 25%, #000 75%, #fff 75%);
            background-size: 10px 10px;
        }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input { padding: 10px; font-size: 16px; width: 200px; text-align: center; margin-right: 10px; }
        table { margin: 20px auto; width: 60%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>

    <h1>Simulador de Corrida</h1>
    
    <div id="pista">
        <div id="carro"></div>
        <div id="linha-chegada"></div>
    </div>

    <!-- NEW: Text input for the driver's car name -->
    <div>
        <input type="text" id="nome-carro" placeholder="Nome do seu carro" value="Carro Padrão">
        <button onclick="iniciarCorrida()">🏁 Iniciar Corrida</button>
    </div>
    
    <h2 id="cronometro">Tempo: 0.00s</h2>

    <br>
    <h2>🏆 Melhores Voltas (Leaderboard)</h2>
    <table>
        <thead>
            <tr>
                <th>Posição</th>
                <th>Veículo</th>
                <th>Tempo (s)</th>
            </tr>
        </thead>
        <tbody>
            {% for r in recordes %}
            <tr>
                <td>{{ forloop.counter }}º</td>
                <td>{{ r.veiculo }}</td>
                <td>{{ r.tempo_segundos }}s</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Nenhuma volta registrada ainda!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        let inicio;

        function iniciarCorrida() {
            const carro = document.getElementById('carro');
            const pista = document.getElementById('pista');
            const cronometro = document.getElementById('cronometro');
            
            let posicao = 0;
            carro.style.left = '0px';
            inicio = performance.now();

            const limiteChegada = pista.clientWidth - 115; 

            const loop = setInterval(() => {
                posicao += Math.random() * 10 + 2; 
                carro.style.left = posicao + 'px';

                let tempoAtual = ((performance.now() - inicio) / 1000).toFixed(2);
                cronometro.innerText = `Tempo: ${tempoAtual}s`;

                if (posicao >= limiteChegada) {
                    clearInterval(loop);
                    const tempoFinal = ((performance.now() - inicio) / 1000).toFixed(3);
                    cronometro.innerText = `🏁 Chegada! Tempo final: ${tempoFinal}s`;
                    
                    enviarTempo(tempoFinal);
                }
            }, 30);
        }

        function enviarTempo(tempo) {
            // NEW: Captures whatever text was typed into the input field
            const nomeDigitado = document.getElementById('nome-carro').value;

            fetch('/salvar-volta/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    veiculo: nomeDigitado, // Sends the custom name to Django
                    tempo: parseFloat(tempo) 
                })
            })
            .then(res => res.json())
            .then(data => {
                console.log('Salvo com sucesso:', data);
                window.location.reload(); 
            })
            .catch(err => console.error('Erro ao salvar:', err));
        }
    </script>
</body>
</html>
